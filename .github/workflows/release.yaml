name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-amd64
          - os: macos-latest
            suffix: macos-arm64
          - os: windows-latest
            suffix: windows-amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: 25
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: mvn -B -Pnative install
      - run: tar -czf cronnext-${{ matrix.suffix }}.tar.gz -C target cronnext
        if: matrix.ext == ''
      - run: Compress-Archive -Path target/cronnext.exe -DestinationPath cronnext-${{ matrix.suffix }}.zip
        if: matrix.ext == '.exe'
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: cronnext-${{ matrix.suffix }}
          path: cronnext-${{ matrix.suffix }}.*
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}